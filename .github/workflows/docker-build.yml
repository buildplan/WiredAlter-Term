name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "dev", "dev-*", "dev_*" ]
    tags: [ 'v*.*.*' ]
    paths-ignore:
      - '**.md'
      - 'compose.yml'
      - '.gitignore'
      - 'renovate.json'
      - 'LICENSE'
      - 'docs/**'
      - '.github/dependabot.yml'
      - '.github/workflows/auto-tag.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # JOB 1: RUN TESTS
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js 26
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '26.5.0'
          cache: 'npm'

      # Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y make g++ python3
          npm ci --loglevel=error --no-fund

      # Run the test script
      - name: Run Tests
        run: npm test

  # JOB 2: BUILD & PUSH (Only runs if 'test' passes)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Setup QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      # Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Login to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate Tags
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=ref,event=branch
            type=semver,pattern={{version}}

      # Build and Push
      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}

      # Cleanup
      - name: Clean up old GHCR images
        id: cleaner 
        uses: buildplan/ghcr-cleaner@v1
        with:
          owner-type: user
          token: ${{ secrets.PAT_TOKEN }}
          repository-owner: ${{ github.repository_owner }}
          repository-name: "wiredalter-term"
          delete-untagged: true
          keep-at-most: 5
          skip-tags: "latest, main, dev, [0-9]*.[0-9]*.[0-9]*"

      # Print the output                                                          
      - name: Show number of deleted images
        run: |
          echo "Number of deleted images in this run: ${{ steps.cleaner.outputs.num_deleted }}"
