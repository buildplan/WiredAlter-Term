name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "dev", "dev-*", "dev_*" ]
    tags: [ 'v*.*.*' ]
    paths-ignore:
      - '**.md'
      - 'compose.yml'
      - '.gitignore'
      - 'renovate.json'
      - 'LICENSE'
      - 'docs/**'
      - '.github/dependabot.yml'
      - '.github/workflows/auto-tag.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # JOB 1: RUN TESTS
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: '26.4.0'
          cache: 'npm'

      # Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y make g++ python3
          npm ci --loglevel=error --no-fund

      # Run the test script
      - name: Run Tests
        run: npm test

  # JOB 2: BUILD & PUSH (Only runs if 'test' passes)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Setup QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      # Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Login to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate Tags
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=ref,event=branch
            type=semver,pattern={{version}}

      # Build and Push
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}

      # Cleanup
      - name: Clean up old GHCR images
        uses: freke/github_docker_package_cleanup@v1.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}
          package: "wiredalter-term"
          keep: "^main$, ^dev$"
          days: 7
          dry_run: false
        continue-on-error: true
